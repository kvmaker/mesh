version: 2

project_name: mesh

builds:
  - id: meshd
    main: ./cmd/meshd
    binary: meshd
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: mesh
    main: ./cmd/mesh
    binary: mesh
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: meshd
    ids:
      - meshd
    name_template: "meshd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

  - id: mesh
    ids:
      - mesh
    name_template: "mesh_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore:"

homebrew_casks:
  - name: mesh
    ids:
      - mesh
    repository:
      owner: kvmaker
      name: homebrew-tap
    homepage: "https://github.com/kvmaker/mesh"
    description: "Mesh VPN client — join a self-hosted WireGuard mesh network"

release:
  extra_files:
    - glob: install.sh
